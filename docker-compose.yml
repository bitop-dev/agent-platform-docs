# Full-stack Agent Platform
# Usage: docker compose up --build
#
# Services:
#   api  — Go API server (port 8080)
#   web  — React frontend (port 3000) — proxies /api and /ws to api
#
# Required env vars (set in .env or export):
#   JWT_SECRET       — JWT signing key
#   ENCRYPTION_KEY   — 32-byte hex key for API key encryption at rest
#
# Optional:
#   DEFAULT_MODEL    — LLM model (default: gpt-4o)
#   DEFAULT_PROVIDER — LLM provider (default: openai)

services:
  api:
    build:
      context: ../agent-platform-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - DATABASE_URL=sqlite://data/platform.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-openai}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - api-data:/app/data
      - skills-cache:/home/app/.agent-core/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ../agent-platform-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
  skills-cache:
